<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <title>{% block title_status %}{% endblock %}Basic Steam Stats</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-table@1.26.0/dist/bootstrap-table.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
    {% load static %} 
    <link rel="icon" href="{% static 'stats/favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'stats/styles.css' %}">
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand" href="{% url 'index' %}"><em>Basic Steam Stats</em></a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="{% url 'index' %}"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="{% url 'database' %}"
                  >Database</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'find_steam_id' %}">Find your SteamID</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main>      
      <div class="container">
        {% block content %}{% endblock %}
      </div>
    </main>

    <footer class="p-5 mt-5" style="background-color: var(--bs-dark-bg-subtle);">
      <div class="row justify-content-center align-items-center text-center">
        <div class="col">
          Created by 
          <a class="test" href="https://jakobfrederikson.github.io/site/" target="_blank">Jakob</a>
        </div>
        
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/jquery/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-table@1.26.0/dist/bootstrap-table.min.js"></script>
  </body>
</html>
